<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI英文口語教練_csv(含測驗與自動存檔)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
        }
        .text-fit-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .diff-error {
            border-bottom: 2px dotted #fca5a5;
        }
        .copyright-tag {
            position: absolute;
            right: 1.5rem;
            bottom: 1rem;
            font-size: 10px;
            font-weight: 600;
            color: rgba(100, 116, 139, 0.4);
            pointer-events: none;
        }
        @keyframes pulse-ring {
            0% { transform: scale(.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .mic-active::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse-ring 1.5s infinite;
            z-index: 0;
        }
        .quiz-content-wrapper {
            max-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1rem;
        }
    </style>
</head>
<body class="bg-[#e2e4e7] text-slate-800">
    <div id="app" class="h-full w-full flex flex-col items-center px-4 py-4">
        
        <!-- 頂部資訊列 (包含進度與統計) -->
        <div id="top-bar" class="w-full max-w-5xl bg-white/70 backdrop-blur-md px-4 py-2 rounded-[2rem] shadow-sm border border-white/50 mb-3 flex items-center gap-4 hidden shrink-0">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="toggleInfo(true)" class="p-1.5 text-slate-400 hover:text-blue-500 bg-slate-100/50 rounded-full">
                    <i data-lucide="info" class="w-5 h-5"></i>
                </button>
                <label class="p-1.5 text-slate-400 hover:text-blue-500 bg-slate-100/50 rounded-full cursor-pointer">
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                    <input type="file" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                </label>
            </div>
            <div id="stats-area" class="flex items-center gap-4 text-xs font-black uppercase">
                <div class="flex items-center gap-1"><span class="text-red-500">重來</span> <span id="stat-again">0</span></div>
                <div class="flex items-center gap-1"><span class="text-orange-500">隨機</span> <span id="stat-random">0</span></div>
                <div class="flex items-center gap-1"><span class="text-blue-500">複習</span> <span id="stat-review">0</span></div>
                <div class="flex items-center gap-1"><span class="text-emerald-500">通過</span> <span id="stat-pass">0</span></div>
            </div>
            <div class="flex-1 flex items-center gap-3">
                <div class="flex-1 h-1.5 bg-slate-100/50 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <div id="queue-count" class="text-xs font-black text-slate-400">0 / 0</div>
            </div>
            <button onclick="clearAndReload()" class="px-4 py-1.5 bg-slate-800 text-white text-xs font-bold rounded-full hover:bg-slate-700 transition-all">首頁</button>
        </div>

        <div id="main-content" class="w-full max-w-4xl flex flex-col flex-1 min-h-0 overflow-hidden">
            
            <!-- 初始匯入狀態 -->
            <div id="empty-state" class="flex-1 flex flex-col items-center justify-center">
                <div class="bg-[#d9dbdf]/80 backdrop-blur p-10 rounded-[3rem] w-full max-w-md flex flex-col items-center text-center shadow-sm relative border border-white/20">
                    <div class="text-blue-500 mb-6"><i data-lucide="book-open" class="w-16 h-16 stroke-[2]"></i></div>
                    <h1 class="text-3xl font-bold text-slate-700 mb-6 tracking-tight">AI英文口語教練</h1>
                    
                    <div class="w-full mb-6 text-left">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-2">Gemini API Key</label>
                        <input type="password" id="api-key-input" placeholder="在此輸入 API Key (選填)..." class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-slate-300 outline-none transition-all text-sm">
                    </div>

                    <label class="w-full bg-white text-slate-700 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 cursor-pointer hover:bg-slate-50 transition-all shadow-sm border border-slate-200 mb-4 active:scale-[0.98]">
                        <i data-lucide="upload" class="w-6 h-6"></i>
                        <span>匯入教材 (CSV)</span>
                        <input type="file" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                    </label>

                    <button onclick="startQuiz(10)" id="start-quiz-btn" class="w-full bg-[#3b71fe] text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:bg-blue-600 transition-all shadow-lg active:scale-[0.98] hidden">
                        <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
                        <span>進行10題測驗</span>
                    </button>

                    <div class="copyright-tag">@Peter Huang 2026/4/26</div>
                </div>
            </div>

            <!-- 卡片複習區域 -->
            <div id="card-display" class="hidden flex-1 flex flex-col min-h-0 overflow-hidden">
                <div id="flashcard" class="bg-white flex-1 min-h-0 w-full rounded-[2.5rem] shadow-xl p-6 md:p-10 flex flex-col relative cursor-pointer border-b-8 border-slate-200 transition-all overflow-hidden" onclick="handleCardClick()">
                    <div id="card-body" class="flex-1 min-h-0 overflow-hidden text-fit-container"></div>
                    
                    <div id="srs-controls" class="hidden grid grid-cols-4 gap-3 mt-4 pt-4 border-t border-slate-50 shrink-0">
                        <button onclick="event.stopPropagation(); handleSRS('again')" class="py-4 rounded-2xl bg-red-50 text-red-600 hover:bg-red-500 hover:text-white font-black text-sm transition-all">重來</button>
                        <button onclick="event.stopPropagation(); handleSRS('random')" class="py-4 rounded-2xl bg-orange-50 text-orange-600 hover:bg-orange-500 hover:text-white font-black text-sm transition-all">隨機</button>
                        <button onclick="event.stopPropagation(); handleSRS('review')" class="py-4 rounded-2xl bg-blue-50 text-blue-600 hover:bg-blue-500 hover:text-white font-black text-sm transition-all">複習</button>
                        <button onclick="event.stopPropagation(); handleSRS('pass')" class="py-4 rounded-2xl bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white font-black text-sm transition-all">通過</button>
                    </div>
                </div>
            </div>

            <!-- 測驗區域 -->
            <div id="quiz-state" class="hidden flex-1 flex flex-col min-h-0 overflow-hidden">
                <div class="bg-white flex-1 min-h-0 w-full rounded-[3rem] shadow-2xl p-6 flex flex-col items-center justify-center text-center relative border-b-8 border-slate-200 overflow-hidden">
                    <div id="quiz-timer" class="absolute top-6 right-8 text-3xl font-black text-slate-200">20</div>
                    
                    <div class="w-full quiz-content-wrapper">
                        <div id="quiz-chinese" class="text-2xl md:text-3xl font-black text-slate-400 leading-tight">載入中...</div>
                        
                        <div id="quiz-result-display" class="flex-1 flex flex-col items-center justify-center min-h-0">
                            <div class="flex items-center justify-center gap-4 mb-2">
                                <div id="quiz-transcript" class="text-3xl md:text-4xl font-black text-slate-800 leading-tight"></div>
                                <div id="quiz-score-tag" class="hidden text-sm font-black bg-slate-100 px-3 py-1 rounded-full shadow-sm text-slate-400 border border-slate-200 shrink-0"></div>
                            </div>
                            
                            <div id="quiz-score-area" class="hidden flex flex-col items-center gap-2">
                                <div class="flex items-center gap-3 bg-blue-50 px-5 py-3 rounded-2xl border border-blue-100">
                                    <button onclick="playQuizAnswerAudio()" class="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center hover:bg-blue-600 active:scale-90 transition-all shadow-sm">
                                        <i data-lucide="volume-2" class="w-5 h-5"></i>
                                    </button>
                                    <div id="quiz-original-english" class="text-lg md:text-xl font-bold text-blue-600 italic"></div>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-center items-center gap-6 mt-2 shrink-0">
                            <button id="quiz-prev-btn" onclick="goToPrevQuizItem()" class="w-16 h-16 rounded-full bg-slate-50 text-slate-300 flex flex-col items-center justify-center shadow hover:bg-slate-100 transition-all invisible">
                                <i data-lucide="chevron-left" class="w-6 h-6"></i>
                                <span class="text-[8px] font-bold uppercase">上一題</span>
                            </button>

                            <button id="quiz-mic-btn" onclick="startQuizListening()" class="w-20 h-20 rounded-full bg-blue-500 text-white flex items-center justify-center shadow-xl hover:scale-105 active:scale-95 transition-all relative shrink-0">
                                <i data-lucide="mic" class="w-8 h-8 relative z-10"></i>
                            </button>

                            <button id="quiz-next-btn" onclick="goToNextQuizItem()" class="w-16 h-16 rounded-full bg-slate-50 text-slate-300 flex flex-col items-center justify-center shadow hover:bg-blue-50 hover:text-blue-500 transition-all invisible">
                                <i data-lucide="chevron-right" class="w-6 h-6"></i>
                                <span class="text-[8px] font-bold uppercase">下一題</span>
                            </button>
                        </div>
                        
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">請大聲讀出英文翻譯</p>
                    </div>
                </div>
            </div>

            <!-- 完成結算頁面 -->
            <div id="finished-state" class="flex-1 flex flex-col items-center justify-center hidden">
                <div id="result-card" class="bg-white p-10 rounded-[3rem] shadow-xl text-center max-w-md w-full border-b-8 border-slate-200">
                    <div id="result-icon"></div>
                    <h2 id="result-title" class="text-2xl font-bold mb-2 text-slate-800">練習完成！</h2>
                    <p id="result-stats" class="text-slate-500 font-medium mb-8"></p>
                    <div class="space-y-4">
                        <button onclick="clearAndReload()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-700 transition-all shadow-lg">返回首頁</button>
                        <button onclick="startQuiz(10)" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">口說測驗</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 說明 Modal -->
    <div id="info-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center px-6 hidden">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="toggleInfo(false)" class="absolute top-6 right-6 text-slate-300 hover:text-slate-500"><i data-lucide="x" class="w-6 h-6"></i></button>
            <h3 class="text-2xl font-black text-slate-800 mb-6">教材準備和匯入說明</h3>
            <div class="space-y-4 text-slate-600 font-medium leading-relaxed">
                <p>請備妥一個符合格式的 <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-bold">CSV</span> 檔案：</p>
                <ul class="list-disc list-inside space-y-2 text-sm">
                    <li>1.課文準備：利用「promp_影片擷取英文句子轉成csv格式.txt」Copy 至gemini製作脚本(XXX.csv)。</li>
                    <li>2.口語練習：將脚本(XXX.csv)匯入「AI英文口語教練_csv(含測驗)」，不需填API，即可練習。</li>
                </ul>
            </div>
            <button onclick="toggleInfo(false)" class="w-full mt-8 bg-blue-500 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-600 transition-all">我明白了</button>
        </div>
    </div>

    <script>
        // --- 核心變數 ---
        let originalCards = [];
        let queue = [];
        let isFlipped = false;
        let stats = { again: 0, random: 0, review: 0, pass: 0 };
        let isListening = false;
        let lastRecognition = null;
        
        let quizPool = [];
        let quizIndex = 0;
        let quizScores = [];
        let quizTimer = null;
        let timeLeft = 20;
        let quizProcessing = false;

        const SAVE_KEY = 'ai_english_coach_progress';

        // --- 自動存檔功能 ---
        function saveProgress() {
            const data = { originalCards, queue, stats, timestamp: Date.now() };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        }

        function loadProgress() {
            const saved = localStorage.getItem(SAVE_KEY);
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                if (data.originalCards && data.originalCards.length > 0) {
                    originalCards = data.originalCards;
                    queue = data.queue;
                    stats = data.stats || { again: 0, random: 0, review: 0, pass: 0 };
                    return true;
                }
            } catch (e) { console.error("無法讀取存檔", e); }
            return false;
        }

        function clearAndReload() {
            localStorage.removeItem(SAVE_KEY);
            location.reload();
        }

        // --- 語音辨識模組 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        
        function updateMicUI(active) {
            isListening = active;
            const quizBtn = document.getElementById('quiz-mic-btn');
            if (quizBtn) {
                if (active) quizBtn.classList.add('mic-active');
                else quizBtn.classList.remove('mic-active');
            }
            if (!document.getElementById('card-display').classList.contains('hidden')) render();
        }

        if (recognition) {
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onstart = () => updateMicUI(true);
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                recognition.stop();
                if (!document.getElementById('quiz-state').classList.contains('hidden')) processQuizResult(text);
                else processRecognitionResult(text);
            };
            recognition.onend = () => updateMicUI(false);
            recognition.onerror = () => updateMicUI(false);
        }

        // --- CSV 解析模組 ---
        function parseCSV(text) {
            const result = [];
            let row = [];
            let col = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
                else if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (col !== "" || row.length > 0) {
                        row.push(col);
                        if (row.length >= 2) {
                            const front = row[0].trim();
                            const lines = row[1].split(/\r?\n/);
                            result.push({ front_display: front, english: lines[0]?.trim() || "", chinese: lines[1]?.trim() || front });
                        }
                        row = []; col = "";
                    }
                } else col += char;
            }
            if (col !== "" || row.length > 0) {
                row.push(col);
                if (row.length >= 2) {
                    const lines = row[1].split(/\r?\n/);
                    result.push({ front_display: row[0].trim(), english: lines[0]?.trim() || "", chinese: lines[1]?.trim() || row[0].trim() });
                }
            }
            return result;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const parsed = parseCSV(e.target.result);
                if (parsed.length > 0) { 
                    originalCards = parsed; 
                    document.getElementById('start-quiz-btn').classList.remove('hidden');
                    startNewSession(); 
                }
            };
            reader.readAsText(file);
        }

        function startNewSession() {
            queue = [...originalCards];
            stats = { again: 0, random: 0, review: 0, pass: 0 };
            isFlipped = false; lastRecognition = null;
            document.querySelectorAll('#empty-state, #finished-state, #quiz-state').forEach(el => el.classList.add('hidden'));
            document.getElementById('card-display').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            saveProgress();
            render();
            playAudio();
        }

        function resumeSession() {
            document.querySelectorAll('#empty-state, #finished-state, #quiz-state').forEach(el => el.classList.add('hidden'));
            document.getElementById('card-display').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('start-quiz-btn').classList.remove('hidden');
            render();
            playAudio();
        }

        // --- 朗讀模組 ---
        function playTextAsMale(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.0; 
            utterance.pitch = 0.9; 
            const voices = window.speechSynthesis.getVoices();
            let selectedVoice = voices.find(v => v.lang.startsWith('en-US') && v.name.toLowerCase().includes('male'));
            if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Google'));
            if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en-US'));
            if (selectedVoice) utterance.voice = selectedVoice;
            window.speechSynthesis.speak(utterance);
        }
        function playAudio() { if (queue.length) playTextAsMale(queue[0].english); }
        function playQuizAnswerAudio() { if (quizPool.length) playTextAsMale(quizPool[quizIndex].english); }

        function handleCardClick() {
            if (!queue.length) return;
            isFlipped = !isFlipped;
            lastRecognition = null;
            render();
        }

        function startListening(e) {
            e.stopPropagation();
            if (!recognition || isListening) return;
            lastRecognition = null; 
            try { recognition.start(); } catch (err) { updateMicUI(false); }
        }

        // --- 評分與 SRS 演算法 ---
        function calculatePronunciationScore(userText, targetText) {
            const target = targetText.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, "").trim();
            const user = userText.toLowerCase().trim();
            const targetWords = target.split(/\s+/);
            const userWords = user.split(/\s+/);
            const diff = userWords.map(w => ({ word: w, status: targetWords.includes(w) ? 'correct' : 'error' }));
            const score = (diff.filter(d => d.status === 'correct').length / targetWords.length) * 10;
            return { score: Math.min(10, score).toFixed(1), diff };
        }

        function processRecognitionResult(text) {
            const { score, diff } = calculatePronunciationScore(text, queue[0].english);
            lastRecognition = { transcript: text, score, diff };
            render();
        }

        function handleSRS(type) {
            const item = queue.shift();
            if (type === 'again') queue.splice(1, 0, item);
            else if (type === 'random') queue.splice(Math.floor(queue.length / 2), 0, item);
            else if (type === 'review') queue.push(item);
            stats[type]++; 
            isFlipped = false; lastRecognition = null;
            saveProgress();
            render(); if (queue.length) playAudio();
        }

        // --- 測驗模組 ---
        function startQuiz(count) {
            if (originalCards.length < 1) return;
            quizPool = [...originalCards].sort(() => Math.random() - 0.5).slice(0, count);
            quizIndex = 0;
            quizScores = Array(quizPool.length).fill(null);
            document.querySelectorAll('#empty-state, #card-display, #finished-state').forEach(el => el.classList.add('hidden'));
            document.getElementById('top-bar').classList.remove('hidden');
            document.getElementById('quiz-state').classList.remove('hidden');
            renderQuizItem();
        }

        function renderQuizItem() {
            if (recognition) recognition.stop();
            updateMicUI(false);
            document.getElementById('quiz-score-area').classList.add('hidden');
            document.getElementById('quiz-score-tag').classList.add('hidden');
            document.getElementById('quiz-transcript').innerText = "";
            document.getElementById('quiz-next-btn').classList.add('invisible');
            quizProcessing = false;
            const item = quizPool[quizIndex];
            document.getElementById('quiz-chinese').innerText = item.chinese;
            document.getElementById('progress-bar').style.width = `${((quizIndex) / quizPool.length) * 100}%`;
            document.getElementById('queue-count').innerText = `${quizIndex + 1} / ${quizPool.length}`;
            const prevBtn = document.getElementById('quiz-prev-btn');
            prevBtn.classList.toggle('invisible', quizIndex === 0);
            resetQuizTimer();
        }

        function resetQuizTimer() {
            clearInterval(quizTimer);
            timeLeft = 20;
            const timerEl = document.getElementById('quiz-timer');
            timerEl.innerText = timeLeft;
            quizTimer = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(quizTimer);
                    if (!quizProcessing) processQuizResult("");
                }
            }, 1000);
        }

        function startQuizListening() {
            if (!recognition || isListening) return;
            document.getElementById('quiz-transcript').innerText = "聆聽中...";
            document.getElementById('quiz-score-area').classList.add('hidden');
            document.getElementById('quiz-score-tag').classList.add('hidden');
            document.getElementById('quiz-next-btn').classList.add('invisible');
            try { recognition.start(); } catch (err) { recognition.stop(); }
        }

        async function processQuizResult(text) {
            clearInterval(quizTimer);
            quizProcessing = true;
            if (recognition) recognition.stop(); 
            const item = quizPool[quizIndex];
            const apiKey = document.getElementById('api-key-input').value;
            let scoreValue = 0;
            let transcriptText = text || "(無收音)";

            if (text) {
                if (apiKey) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: `評估英文翻譯：將「${item.chinese}」譯為英文。學生說：「${text}」。請給出 0-10 分(僅回傳數字)。` }] }] })
                        });
                        const data = await response.json();
                        scoreValue = parseFloat(data.candidates?.[0]?.content?.parts?.[0]?.text?.match(/\d+(\.\d+)?/)?.[0] || 0);
                    } catch (e) {
                        scoreValue = parseFloat(calculatePronunciationScore(text, item.english).score);
                    }
                } else {
                    scoreValue = parseFloat(calculatePronunciationScore(text, item.english).score);
                }
            }
            quizScores[quizIndex] = scoreValue;
            document.getElementById('quiz-transcript').innerText = transcriptText;
            document.getElementById('quiz-score-area').classList.remove('hidden');
            document.getElementById('quiz-original-english').innerText = item.english;
            const scoreTag = document.getElementById('quiz-score-tag');
            scoreTag.innerText = `${scoreValue.toFixed(1)}/10`;
            scoreTag.classList.remove('hidden');
            const nextBtn = document.getElementById('quiz-next-btn');
            nextBtn.classList.remove('invisible');
            nextBtn.querySelector('span').innerText = (quizIndex < quizPool.length - 1) ? "下一題" : "結算";
            lucide.createIcons();
        }

        function goToNextQuizItem() { if (quizIndex < quizPool.length - 1) { quizIndex++; renderQuizItem(); } else showQuizFinalResult(); }
        function goToPrevQuizItem() { if (quizIndex > 0) { quizIndex--; quizScores[quizIndex] = null; renderQuizItem(); } }

        function showQuizFinalResult() {
            document.getElementById('quiz-state').classList.add('hidden');
            document.getElementById('finished-state').classList.remove('hidden');
            document.getElementById('result-icon').innerHTML = `<i data-lucide="award" class="w-24 h-24 text-blue-500 mx-auto mb-6"></i>`;
            document.getElementById('result-title').innerText = "測驗結算";
            const avgScore = (quizScores.reduce((a, b) => (a || 0) + (b || 0), 0) / quizPool.length).toFixed(1);
            document.getElementById('result-stats').innerText = `平均得分：${avgScore} / 10`;
            lucide.createIcons();
        }

        // --- 渲染 UI 邏輯 ---
        function render() {
            const display = document.getElementById('card-display');
            const finished = document.getElementById('finished-state');
            const topBar = document.getElementById('top-bar');
            const quiz = document.getElementById('quiz-state');
            
            if (!queue.length && quiz.classList.contains('hidden') && finished.classList.contains('hidden') && originalCards.length > 0) {
                display.classList.add('hidden'); topBar.classList.add('hidden'); finished.classList.remove('hidden');
                document.getElementById('result-icon').innerHTML = `<i data-lucide="check-circle-2" class="w-16 h-16 text-emerald-500 mx-auto mb-6"></i>`;
                document.getElementById('result-title').innerText = "複習完成！";
                document.getElementById('result-stats').innerText = "您已完成目前所有的教材隊列。";
                localStorage.removeItem(SAVE_KEY);
                lucide.createIcons(); return;
            }

            if (originalCards.length > 0) topBar.classList.remove('hidden');
            document.getElementById('stat-again').innerText = stats.again;
            document.getElementById('stat-random').innerText = stats.random;
            document.getElementById('stat-review').innerText = stats.review;
            document.getElementById('stat-pass').innerText = stats.pass;
            
            if (!display.classList.contains('hidden')) {
                document.getElementById('queue-count').innerText = `${queue.length}/${originalCards.length}`;
                document.getElementById('progress-bar').style.width = `${((originalCards.length - queue.length)/originalCards.length)*100}%`;
            }

            if (!queue.length) return;
            const card = queue[0];
            const cardBody = document.getElementById('card-body');
            const srsControls = document.getElementById('srs-controls');

            if (!isFlipped) {
                srsControls.classList.add('hidden');
                cardBody.innerHTML = `
                    <div class="flex items-center gap-6">
                        <button onclick="event.stopPropagation(); playAudio();" class="text-blue-500 bg-blue-50 p-3 rounded-2xl shrink-0 hover:bg-blue-100 transition-all">
                            <i data-lucide="volume-2" class="w-8 h-8"></i>
                        </button>
                        <div class="text-4xl md:text-5xl font-black text-slate-700 leading-tight">${card.front_display}</div>
                    </div>`;
            } else {
                srsControls.classList.remove('hidden');
                const fs = card.english.length > 40 ? 'text-2xl md:text-3xl' : 'text-4xl md:text-5xl';
                let resultHtml = "";
                if (lastRecognition) {
                    const diffHtml = lastRecognition.diff.map(d => `<span class="${d.status === 'correct' ? 'text-emerald-500' : 'text-red-500 diff-error'}">${d.word}</span>`).join(' ');
                    resultHtml = `<div class="flex-1 bg-slate-50 rounded-2xl p-4 border border-slate-100 flex items-center justify-between"><div class="${fs} font-bold leading-tight">${diffHtml}</div><div class="text-sm font-black bg-white px-3 py-1 rounded-full shadow-sm text-slate-400 shrink-0 ml-4 border border-slate-100">${lastRecognition.score}/10</div></div>`;
                }
                cardBody.innerHTML = `
                    <div class="flex flex-col gap-6">
                        <div class="flex items-start">
                            <button onclick="event.stopPropagation(); playAudio();" class="text-blue-500 bg-blue-50 p-3 rounded-2xl mr-6 shrink-0 hover:bg-blue-100 transition-all">
                                <i data-lucide="volume-2" class="w-8 h-8"></i>
                            </button>
                            <div class="${fs} font-black text-slate-800 leading-tight">${card.english}</div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="startListening(event)" class="p-3 rounded-2xl ${isListening ? 'bg-red-500 text-white' : 'bg-emerald-50 text-emerald-600'} transition-all shrink-0 relative flex items-center justify-center">
                                <div class="${isListening ? 'mic-active' : ''}"></div>
                                <i data-lucide="mic" class="w-8 h-8 relative z-10"></i>
                            </button>
                            ${resultHtml}
                        </div>
                        <div class="flex">
                            <div class="w-8 mr-6 p-3 shrink-0 invisible"></div>
                            <div class="text-xl md:text-2xl font-medium text-slate-400 border-l-4 border-slate-200 pl-6">${card.chinese}</div>
                        </div>
                    </div>`;
            }
            lucide.createIcons();
        }

        function toggleInfo(s) { document.getElementById('info-modal').classList.toggle('hidden', !s); }

        window.onload = () => { 
            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) document.getElementById('api-key-input').value = savedKey;
            document.getElementById('api-key-input').onchange = (e) => localStorage.setItem('gemini_api_key', e.target.value);
            
            // 嘗試載入上次進度
            if (loadProgress()) { resumeSession(); }

            window.speechSynthesis.getVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            lucide.createIcons(); 
        };
    </script>
</body>
</html>
