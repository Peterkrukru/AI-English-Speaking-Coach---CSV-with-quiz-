<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI英文口語教練 - API 整合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
        }
        .text-fit-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .diff-error {
            border-bottom: 2px dotted #fca5a5;
        }
        .copyright-tag {
            position: absolute;
            right: 1.5rem;
            bottom: 1rem;
            font-size: 10px;
            font-weight: 600;
            color: rgba(100, 116, 139, 0.4);
            pointer-events: none;
        }
        .option-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-[#e2e4e7] text-slate-800">
    <div id="app" class="h-full w-full flex flex-col items-center px-4 py-4 md:py-6">
        
        <!-- 頂部資訊列 -->
        <div id="top-bar" class="w-full max-w-5xl bg-white/70 backdrop-blur-md px-4 py-2 rounded-[2rem] shadow-sm border border-white/50 mb-3 flex items-center gap-3 md:gap-4 hidden shrink-0">
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="toggleInfo(true)" class="p-1.5 text-slate-400 hover:text-blue-500 transition-colors bg-slate-100/50 rounded-full">
                    <i data-lucide="info" class="w-4 h-4 md:w-5 md:h-5"></i>
                </button>
                <label class="p-1.5 text-slate-400 hover:text-blue-500 transition-colors bg-slate-100/50 rounded-full cursor-pointer">
                    <i data-lucide="upload-cloud" class="w-4 h-4 md:w-5 md:h-5"></i>
                    <input type="file" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                </label>
            </div>
            <div class="w-[1px] h-4 bg-slate-200 shrink-0"></div>
            <div id="stats-area" class="flex items-center gap-2 md:gap-4 text-[10px] md:text-xs font-black whitespace-nowrap uppercase">
                <div class="flex items-center gap-1"><span class="text-red-500">重來</span> <span id="stat-again">0</span></div>
                <div class="flex items-center gap-1"><span class="text-orange-500">隨機</span> <span id="stat-random">0</span></div>
                <div class="flex items-center gap-1"><span class="text-blue-500">複習</span> <span id="stat-review">0</span></div>
                <div class="flex items-center gap-1"><span class="text-emerald-500">通過</span> <span id="stat-pass">0</span></div>
            </div>
            <div class="flex-1 flex items-center gap-3 min-w-0">
                <div id="progress-container" class="flex-1 h-1.5 bg-slate-100/50 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <div id="queue-count" class="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-tighter shrink-0">0 / 0</div>
            </div>
        </div>

        <!-- 主內容區域 -->
        <div id="main-content" class="w-full max-w-4xl flex flex-col flex-1 min-h-0 overflow-hidden">
            
            <!-- 首頁匯入與 API 設定 -->
            <div id="empty-state" class="flex-1 flex flex-col items-center justify-center">
                <div class="bg-[#d9dbdf]/80 backdrop-blur p-10 rounded-[3rem] w-full max-w-md flex flex-col items-center text-center shadow-sm relative">
                    <div class="text-blue-500 mb-6"><i data-lucide="book-open" class="w-16 h-16 stroke-[2]"></i></div>
                    <h1 class="text-3xl font-bold text-slate-700 mb-6 tracking-tight">AI英文口語教練</h1>
                    
                    <div class="w-full mb-6 text-left">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-2">
                            Gemini API Key (儲存於本機)
                        </label>
                        <input type="password" id="api-key-input" 
                            placeholder="在此輸入 API Key..." 
                            class="w-full px-5 py-3 rounded-2xl bg-white/50 border border-slate-300 focus:border-blue-500 outline-none transition-all text-sm"
                            onchange="saveApiKey(this.value)">
                    </div>

                    <label class="w-full bg-[#3b71fe] text-white py-4 px-8 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 cursor-pointer hover:bg-blue-600 transition-all shadow-lg active:scale-[0.98] mb-6">
                        <i data-lucide="upload" class="w-6 h-6"></i>
                        <span>匯入教材 (CSV)</span>
                        <input type="file" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                    </label>
                    <div class="copyright-tag">@Peter Huang 2026/4/15</div>
                </div>
            </div>

            <!-- 完成狀態與測驗按鈕 -->
            <div id="finished-state" class="flex-1 flex flex-col items-center justify-center hidden">
                <div class="bg-white p-10 rounded-[3rem] shadow-xl text-center max-w-sm w-full relative">
                    <i data-lucide="check-circle-2" class="w-16 h-16 text-emerald-500 mx-auto mb-6"></i>
                    <h2 class="text-2xl font-bold mb-8 text-slate-800">練習完成！</h2>
                    <div class="space-y-4">
                        <button onclick="startNewSession()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 transition-colors shadow-lg">再練習一次</button>
                        <button id="start-test-btn" onclick="generateAndStartTest()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-500 transition-all shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="graduation-cap" class="w-5 h-5"></i> 進行 10 題測驗
                        </button>
                    </div>
                </div>
            </div>

            <!-- 測驗進行介面 -->
            <div id="quiz-state" class="flex-1 flex flex-col hidden overflow-hidden">
                <div id="quiz-card" class="bg-white h-full w-full rounded-[2.5rem] shadow-xl p-5 md:p-8 flex flex-col relative border-b-8 border-blue-100 overflow-hidden">
                    <div class="flex justify-between items-center mb-2 shrink-0">
                        <span id="quiz-progress-text" class="text-xs font-black text-blue-500 uppercase tracking-widest">Question 1/10</span>
                        <button onclick="startNewSession()" class="text-[10px] font-bold text-slate-400 hover:text-red-500">結束測驗</button>
                    </div>
                    <div id="quiz-content" class="flex-1 flex flex-col min-h-0 overflow-hidden"></div>
                    <div id="quiz-feedback" class="hidden mt-2 p-3 rounded-xl border-2 shrink-0"></div>
                    <button id="next-quiz-btn" onclick="nextQuizQuestion()" class="hidden mt-2 w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 active:scale-[0.99] transition-all shrink-0">下一題</button>
                </div>
            </div>

            <!-- 測驗結算頁 -->
            <div id="test-finished-state" class="flex-1 flex flex-col items-center justify-center hidden">
                <div class="bg-white p-10 rounded-[3rem] shadow-xl text-center max-w-sm w-full relative">
                    <i data-lucide="trophy" class="w-16 h-16 text-orange-400 mx-auto mb-6"></i>
                    <h2 class="text-2xl font-bold mb-2 text-slate-800">測驗完成！</h2>
                    <p id="quiz-final-score" class="text-3xl font-black text-blue-600 mb-8"></p>
                    <div class="space-y-4">
                        <button onclick="startNewSession()" class="w-full bg-slate-100 text-slate-700 py-4 rounded-xl font-bold hover:bg-slate-200 transition-colors">回到口語練習</button>
                        <button onclick="generateAndStartTest()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-500 transition-colors shadow-lg">重新測驗</button>
                    </div>
                </div>
            </div>

            <!-- 卡片練習介面 -->
            <div id="card-display" class="hidden flex-1 flex flex-col min-h-0 overflow-hidden">
                <div id="flashcard" class="bg-white flex-1 min-h-0 w-full rounded-[2.5rem] shadow-xl p-5 md:p-8 flex flex-col relative cursor-pointer border-b-8 border-slate-200 transition-all overflow-hidden" onclick="handleCardClick()">
                    <div id="card-body" class="flex-1 min-h-0 overflow-hidden text-fit-container"></div>
                    <div id="srs-controls" class="hidden grid grid-cols-4 gap-2 md:gap-4 mt-2 pt-2 border-t border-slate-50 shrink-0">
                        <button onclick="event.stopPropagation(); handleSRS('again')" class="py-3 rounded-xl bg-red-50 text-red-600 hover:bg-red-500 hover:text-white font-black text-xs md:text-sm transition-all">重來</button>
                        <button onclick="event.stopPropagation(); handleSRS('random')" class="py-3 rounded-xl bg-orange-50 text-orange-600 hover:bg-orange-500 hover:text-white font-black text-xs md:text-sm transition-all">隨機</button>
                        <button onclick="event.stopPropagation(); handleSRS('review')" class="py-3 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-500 hover:text-white font-black text-xs md:text-sm transition-all">複習</button>
                        <button onclick="event.stopPropagation(); handleSRS('pass')" class="py-3 rounded-xl bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white font-black text-xs md:text-sm transition-all">通過</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 各種彈窗 -->
    <div id="info-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden px-6" onclick="toggleInfo(false)">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-sm w-full shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-700">使用說明</h3>
            <ul class="space-y-3 text-slate-600 text-sm font-medium">
                <li>• <b>API 金鑰</b>：在首頁輸入金鑰後會自動保存。</li>
                <li>• <b>點擊卡片</b>：切換中英文。</li>
                <li>• <b>麥克風圖示</b>：開啟口說辨識，AI 會為您的發音打分。</li>
                <li>• <b>智能測驗</b>：完成教材複習後，點擊按鈕 AI 將根據教材自動出題。</li>
            </ul>
            <button onclick="toggleInfo(false)" class="w-full mt-8 py-3 bg-slate-800 text-white rounded-xl font-bold">我知道了</button>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[110] flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <p id="loading-text" class="text-white font-bold text-lg tracking-widest px-10 text-center">AI 正在為您設計專屬測驗題...<br><span class="text-sm font-normal text-slate-400 opacity-70">這可能需要 5-10 秒</span></p>
    </div>

    <script>
        // 核心變數
        let userApiKey = localStorage.getItem('gemini_api_key') || "";
        let originalCards = [];
        let queue = [];
        let isFlipped = false;
        let stats = { again: 0, random: 0, review: 0, pass: 0 };
        let isListening = false;
        let lastRecognition = null;
        let quizData = [];
        let currentQuizIndex = 0;
        let quizScore = 0;
        let quizAnswered = false;

        // 語音辨識
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'en-US';
            recognition.onresult = (e) => processRecognitionResult(e.results[0][0].transcript);
            recognition.onend = () => { isListening = false; render(); };
            recognition.onerror = () => { isListening = false; render(); };
        }

        function saveApiKey(val) {
            userApiKey = val.trim();
            localStorage.setItem('gemini_api_key', userApiKey);
        }

        function parseCSV(text) {
            const rows = text.split(/\r?\n/);
            return rows.filter(r => r.trim().includes(',')).map(line => {
                const parts = line.split(',');
                return { 
                    front: parts[0].trim().replace(/^"|"$/g, ''), 
                    back: parts[1].trim().replace(/^"|"$/g, '') 
                };
            });
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const parsed = parseCSV(e.target.result);
                if (parsed.length > 0) { 
                    originalCards = parsed; 
                    startNewSession(parsed); 
                }
            };
            reader.readAsText(file);
        }

        function startNewSession(cards = originalCards) {
            queue = [...cards];
            stats = { again: 0, random: 0, review: 0, pass: 0 };
            isFlipped = false;
            lastRecognition = null;
            document.querySelectorAll('#finished-state, #quiz-state, #test-finished-state').forEach(el => el.classList.add('hidden'));
            render();
            if (queue.length > 0) playAudio();
        }

        function playAudio(customText = null) {
            window.speechSynthesis.cancel();
            const text = customText || (isFlipped ? queue[0].back.split('\n')[0] : queue[0].front);
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        // AI 測驗生成工具函式
        async function fetchWithRetry(url, options, maxRetries = 5) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    
                    // 指數退避延遲
                    const delay = Math.pow(2, i) * 1000;
                    
                    if (response.status === 429 || response.status >= 500) {
                        await new Promise(res => setTimeout(res, delay));
                        continue;
                    }
                    
                    // 404, 403 等直接報錯
                    throw new Error(`API Error: ${response.status}`);
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(res => setTimeout(res, 1000));
                }
            }
        }

        async function generateAndStartTest() {
            const currentKey = userApiKey || document.getElementById('api-key-input').value;
            if (!currentKey) {
                alert("請在首頁輸入有效的 Gemini API Key。");
                location.reload();
                return;
            }

            if (originalCards.length < 3) return alert("教材數量太少，建議至少匯入 3 條句子。");
            
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');

            const cardContext = originalCards.slice(0, 30).map(c => `[ZH: ${c.front} | EN: ${c.back}]`).join('\n');
            const systemPrompt = `You are an English teacher. Create 10 quiz questions based on the provided sentences.
            Format: JSON array of objects.
            Question types distribution:
            - Fill-in-the-blank (Cloze)
            - Translation (Chinese to English choice)
            - Sentence Reordering
            { "type": "cloze/translation/reorder", "question": "string", "options": ["A","B","C","D"], "answer": "correct_option", "explanation": "Traditional Chinese explanation", "full_sentence": "full English text" }`;

            // 修正：模型名稱需確保正確
            const modelUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`;

            try {
                const response = await fetchWithRetry(modelUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Sentences:\n${cardContext}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.7
                        }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawText) throw new Error("API 未返回有效內容，請檢查金鑰權限。");
                
                quizData = JSON.parse(rawText);
                currentQuizIndex = 0; 
                quizScore = 0;
                
                document.getElementById('finished-state').classList.add('hidden');
                document.getElementById('quiz-state').classList.remove('hidden');
                renderQuizQuestion();
            } catch (err) {
                console.error("Quiz Generation Error:", err);
                alert("生成失敗：錯誤碼 404 或 403。請確認您的 API Key 是否正確且支援 gemini-2.5-flash 模型。詳細錯誤: " + err.message);
            } finally {
                overlay.classList.add('hidden');
            }
        }

        function renderQuizQuestion() {
            const q = quizData[currentQuizIndex];
            const container = document.getElementById('quiz-content');
            const feedback = document.getElementById('quiz-feedback');
            const nextBtn = document.getElementById('next-quiz-btn');
            
            document.getElementById('quiz-progress-text').innerText = `Question ${currentQuizIndex + 1}/10`;
            feedback.classList.add('hidden');
            nextBtn.classList.add('hidden');
            quizAnswered = false;

            const safeAudioText = (q.full_sentence || q.question).replace(/'/g, "\\'");
            let html = `
                <div class="flex items-center gap-3 mb-4 shrink-0">
                    <button onclick="playAudio('${safeAudioText}')" class="text-blue-500 bg-blue-50 p-2 rounded-lg border border-blue-100"><i data-lucide="volume-2" class="w-5 h-5"></i></button>
                    <h3 class="text-base md:text-lg font-bold text-slate-700 leading-tight">${q.question}</h3>
                </div>
                <div class="grid grid-cols-1 gap-2 overflow-y-auto pr-1">`;
            q.options.forEach((opt, idx) => {
                const safeOpt = opt.replace(/'/g, "\\'");
                html += `<button id="opt-${idx}" onclick="checkQuizAnswer('${safeOpt}', 'opt-${idx}')" class="option-btn text-left p-3 rounded-xl border-2 border-slate-100 hover:border-blue-400 hover:bg-blue-50 transition-all font-medium text-slate-600 text-sm">${opt}</button>`;
            });
            html += `</div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        function checkQuizAnswer(selected, btnId) {
            if (quizAnswered) return;
            quizAnswered = true;
            const q = quizData[currentQuizIndex];
            const feedback = document.getElementById('quiz-feedback');
            const isCorrect = selected.trim().toLowerCase() === q.answer.trim().toLowerCase();
            if (isCorrect) quizScore++;

            const btn = document.getElementById(btnId);
            btn.classList.replace('border-slate-100', isCorrect ? 'border-emerald-500' : 'border-red-500');
            btn.classList.add(isCorrect ? 'bg-emerald-50' : 'bg-red-50');

            feedback.className = `mt-2 p-3 rounded-xl border-2 shrink-0 ${isCorrect ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-red-50 border-red-100 text-red-700'}`;
            feedback.innerHTML = `
                <div class="font-black text-xs uppercase flex items-center gap-1">
                    <i data-lucide="${isCorrect ? 'check' : 'x'}" class="w-4 h-4"></i>
                    ${isCorrect ? '太棒了！' : '答錯囉'}
                </div>
                <div class="text-[10px] mt-1 text-slate-500">正確答案：${q.answer}<br>${q.explanation}</div>
            `;
            feedback.classList.remove('hidden');
            document.getElementById('next-quiz-btn').classList.remove('hidden');
            lucide.createIcons();
        }

        function nextQuizQuestion() {
            currentQuizIndex++;
            if (currentQuizIndex < 10) renderQuizQuestion();
            else {
                document.getElementById('quiz-state').classList.add('hidden');
                document.getElementById('test-finished-state').classList.remove('hidden');
                document.getElementById('quiz-final-score').innerText = `${quizScore} / 10`;
            }
        }

        function toggleFlip() { 
            if (!queue.length) return; 
            isFlipped = !isFlipped; 
            if(!isFlipped) lastRecognition = null;
            render(); 
            playAudio(); 
        }

        function handleCardClick() { toggleFlip(); }
        
        function startListening(e) {
            e.stopPropagation();
            if (!recognition) return alert("您的瀏覽器不支援語音辨識功能。");
            isListening = true; lastRecognition = null; render(); recognition.start();
        }

        function processRecognitionResult(text) {
            const clean = s => s.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, "").trim();
            const target = clean(queue[0].back.split('\n')[0]);
            const user = clean(text);
            const words = user.split(/\s+/);
            const targetWords = target.split(/\s+/);
            const diff = words.map(w => ({ word: w, status: targetWords.includes(w) ? 'correct' : 'error' }));
            const score = (diff.filter(d => d.status === 'correct').length / targetWords.length) * 10;
            lastRecognition = { transcript: text, score: Math.min(10, score).toFixed(1), diff };
            render();
        }

        function handleSRS(type) {
            const item = queue.shift();
            if (type === 'again') queue.splice(1, 0, item);
            else if (type === 'random') queue.splice(Math.floor(queue.length / 2), 0, item);
            else if (type === 'review') queue.push(item);
            stats[type]++; isFlipped = false; lastRecognition = null;
            render(); if (queue.length) playAudio();
        }

        function render() {
            const empty = document.getElementById('empty-state'), finished = document.getElementById('finished-state'), display = document.getElementById('card-display'), topBar = document.getElementById('top-bar');
            if (!originalCards.length) { topBar.classList.add('hidden'); empty.classList.remove('hidden'); }
            else if (!queue.length) { topBar.classList.add('hidden'); finished.classList.remove('hidden'); display.classList.add('hidden'); }
            else {
                topBar.classList.remove('hidden'); empty.classList.add('hidden'); finished.classList.add('hidden'); display.classList.remove('hidden');
                document.getElementById('stat-again').innerText = stats.again;
                document.getElementById('stat-random').innerText = stats.random;
                document.getElementById('stat-review').innerText = stats.review;
                document.getElementById('stat-pass').innerText = stats.pass;
                document.getElementById('queue-count').innerText = `${queue.length}/${originalCards.length}`;
                document.getElementById('progress-bar').style.width = `${((originalCards.length - queue.length)/originalCards.length)*100}%`;
                
                const card = queue[0];
                const cardBody = document.getElementById('card-body');
                const fs = card.front.length > 40 ? 'text-xl md:text-2xl' : 'text-2xl md:text-4xl';

                if (!isFlipped) {
                    document.getElementById('srs-controls').classList.add('hidden');
                    cardBody.innerHTML = `<div class="flex items-start gap-4"><div class="text-blue-500 bg-blue-50 p-2 rounded-xl shrink-0"><i data-lucide="volume-2" class="w-6 h-6"></i></div><div class="${fs} font-black text-slate-700">${card.front}</div></div>`;
                } else {
                    document.getElementById('srs-controls').classList.remove('hidden');
                    const lines = card.back.split('\n');
                    let html = `<div class="flex items-start mb-2"><div class="flex flex-col gap-2 mr-3"><div class="text-blue-500 bg-blue-50 p-2 rounded-xl"><i data-lucide="volume-2" class="w-5 h-5"></i></div><button onclick="startListening(event)" class="p-2 rounded-xl ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-emerald-50 text-emerald-600'}"><i data-lucide="mic" class="w-5 h-5"></i></button></div><div class="${fs} font-bold text-slate-800">${lines[0]}</div></div>`;
                    if(lines[1]) html += `<div class="ml-12 text-slate-400 italic border-l-2 pl-3 mb-2">${lines[1]}</div>`;
                    if(lastRecognition) {
                        const diffHtml = lastRecognition.diff.map(d => `<span class="${d.status === 'correct' ? 'text-emerald-500' : 'text-red-500 diff-error'}">${d.word}</span>`).join(' ');
                        html += `<div class="mt-auto pt-4 bg-slate-50 rounded-2xl p-4 border border-slate-100 shrink-0"><div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">辨識結果</div><div class="${fs} font-bold leading-tight mb-2">${diffHtml}</div><div class="text-3xl font-black text-slate-700">${lastRecognition.score}<span class="text-sm font-normal text-slate-300">/10</span></div></div>`;
                    }
                    cardBody.innerHTML = `<div class="flex flex-col h-full">${html}</div>`;
                }
            }
            lucide.createIcons();
        }

        function toggleInfo(s) { document.getElementById('info-modal').classList.toggle('hidden', !s); }

        window.addEventListener('keydown', e => {
            if (document.getElementById('quiz-state').classList.contains('hidden')) {
                if(e.key === ' ') { e.preventDefault(); toggleFlip(); }
                else if(e.key === 'Enter') { e.preventDefault(); playAudio(); }
                else if(isFlipped && ['1','2','3','4'].includes(e.key)) handleSRS(['again','random','review','pass'][parseInt(e.key)-1]);
            }
        });

        window.onload = () => {
            lucide.createIcons();
            const keyInput = document.getElementById('api-key-input');
            if (keyInput && userApiKey) {
                keyInput.value = userApiKey;
            }
        };
    </script>
</body>
</html>
